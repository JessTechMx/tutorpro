{% extends "base.html" %}
{% block title %}Registrarse — TutorPro{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><span class="logo-mark">T</span></div>
    <h1 class="auth-title">Crear cuenta</h1>
    <p class="auth-sub">Únete a la plataforma de aprendizaje</p>
    <div id="authError" class="auth-error" style="display:none"></div>
    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" id="name" class="form-input" placeholder="Tu nombre completo">
    </div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="email" class="form-input" placeholder="tu@correo.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" class="form-input" placeholder="Mínimo 6 caracteres">
    </div>
    <div class="form-group">
      <label>Tipo de cuenta</label>
      <select id="role" class="form-select">
        <option value="student">Alumno</option>
        <option value="parent">Padre / Tutor</option>
      </select>
    </div>
    <button class="btn-primary-sm full-width" onclick="doRegister()">
      Crear cuenta <i class="ti ti-arrow-right"></i>
    </button>
    <p class="auth-switch">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function doRegister() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const role = document.getElementById('role').value;
  if (!name || !email || !password) {
    document.getElementById('authError').textContent = 'Por favor completa todos los campos.';
    document.getElementById('authError').style.display = 'block';
    return;
  }
  const res = await fetch('/register', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name, email, password, role})
  });
  const data = await res.json();
  if (data.success) {
    window.location.href = data.role === 'admin' ? '/admin' : '/dashboard';
  } else {
    const err = document.getElementById('authError');
    err.textContent = data.error || 'Error al registrarse';
    err.style.display = 'block';
  }
}
</script>
{% endblock %}
